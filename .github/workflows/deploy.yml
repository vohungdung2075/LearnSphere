name: Deploy LearnSphere to AWS

on:
  workflow_dispatch:

concurrency:
  group: learnsphere-production
  cancel-in-progress: false

permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ap-southeast-1
  ECR_REPOSITORY: learnsphere-be

jobs:
  # ════════════════════════════════════════════════════════════
  # JOB 1: Build Docker image → Push ECR → Deploy lên EC2
  # ════════════════════════════════════════════════════════════
  deploy-backend:
    name: 🚀 Deploy Backend (Docker → ECR → EC2)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: LearnSphere_BE/package-lock.json

      - name: ✅ Install and test backend
        run: |
          cd LearnSphere_BE
          npm ci
          npm test

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: 🐳 Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 🏗️ Build, tag, and push Docker image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          cd LearnSphere_BE

          echo "Building Docker image..."
          docker build \
            -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG \
            .

          echo "Pushing to ECR..."
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: 🖥️ Deploy backend qua AWS Systems Manager
        env:
          EC2_INSTANCE_ID: ${{ secrets.EC2_INSTANCE_ID }}
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail

          if [[ ! "$EC2_INSTANCE_ID" =~ ^i-[0-9a-f]+$ ]]; then
            echo "EC2_INSTANCE_ID không hợp lệ hoặc chưa được cấu hình."
            exit 1
          fi

          {
            printf 'AWS_REGION=%q\n' "$AWS_REGION"
            printf 'ECR_REGISTRY=%q\n' "$ECR_REGISTRY"
            printf 'ECR_REPOSITORY=%q\n' "$ECR_REPOSITORY"
            printf 'IMAGE_TAG=%q\n' "$IMAGE_TAG"
            cat <<'DEPLOY_SCRIPT'
          set -euo pipefail

          IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${IMAGE_TAG}"

          rollback() {
            echo "=== Deploy lỗi, khôi phục container trước ==="
            docker rm -f learnsphere-be-candidate 2>/dev/null || true
            docker rm -f learnsphere-be 2>/dev/null || true
            if docker container inspect learnsphere-be-rollback >/dev/null 2>&1; then
              docker rename learnsphere-be-rollback learnsphere-be
              docker start learnsphere-be
            fi
            exit 1
          }

          wait_ready() {
            PORT_TO_CHECK="$1"
            for attempt in $(seq 1 24); do
              if curl --fail --silent "http://127.0.0.1:${PORT_TO_CHECK}/health/ready" >/dev/null; then
                return 0
              fi
              sleep 5
            done
            return 1
          }

          echo "=== [1/6] Login vào ECR ==="
          aws ecr get-login-password --region "$AWS_REGION" | \
            docker login --username AWS --password-stdin "$ECR_REGISTRY"

          echo "=== [2/6] Pull đúng image của commit hiện tại ==="
          docker pull "$IMAGE"

          echo "=== [3/6] Smoke test candidate trên port nội bộ 5001 ==="
          docker rm -f learnsphere-be-candidate 2>/dev/null || true
          docker run -d \
            --name learnsphere-be-candidate \
            -p 127.0.0.1:5001:5000 \
            --env-file /home/ec2-user/.env \
            --log-driver awslogs \
            --log-opt "awslogs-region=$AWS_REGION" \
            --log-opt awslogs-group=/learnsphere/backend \
            --log-opt "awslogs-stream=candidate-ec2-$(hostname)" \
            "$IMAGE"

          if ! wait_ready 5001; then
            docker logs --tail 100 learnsphere-be-candidate || true
            docker rm -f learnsphere-be-candidate || true
            echo "Candidate không sẵn sàng; container hiện tại vẫn được giữ nguyên."
            exit 1
          fi

          echo "=== [4/6] Giữ container cũ để rollback ==="
          docker rm -f learnsphere-be-rollback 2>/dev/null || true
          if docker container inspect learnsphere-be >/dev/null 2>&1; then
            docker stop -t 15 learnsphere-be
            docker rename learnsphere-be learnsphere-be-rollback
          fi
          docker rm -f learnsphere-be-candidate

          echo "=== [5/6] Chạy container mới trên port production ==="
          docker run -d \
            --name learnsphere-be \
            --restart unless-stopped \
            -p 5000:5000 \
            --env-file /home/ec2-user/.env \
            --log-driver awslogs \
            --log-opt "awslogs-region=$AWS_REGION" \
            --log-opt awslogs-group=/learnsphere/backend \
            --log-opt "awslogs-stream=ec2-$(hostname)" \
            "$IMAGE" || rollback

          echo "=== [6/6] Xác minh production và hoàn tất ==="
          if ! wait_ready 5000; then
            docker logs --tail 100 learnsphere-be || true
            rollback
          fi

          docker rm -f learnsphere-be-rollback 2>/dev/null || true
          docker image prune -f
          echo "=== ✅ Backend deployed và health check thành công ==="
          docker ps --filter name=learnsphere-be
          DEPLOY_SCRIPT
          } > /tmp/learnsphere-deploy.sh

          jq -n \
            --rawfile script /tmp/learnsphere-deploy.sh \
            '{commands: [$script], executionTimeout: ["900"]}' \
            > /tmp/learnsphere-ssm-parameters.json

          COMMAND_ID=$(aws ssm send-command \
            --instance-ids "$EC2_INSTANCE_ID" \
            --document-name AWS-RunShellScript \
            --comment "Deploy LearnSphere backend ${IMAGE_TAG}" \
            --timeout-seconds 900 \
            --parameters file:///tmp/learnsphere-ssm-parameters.json \
            --query 'Command.CommandId' \
            --output text)

          echo "SSM command: $COMMAND_ID"
          for attempt in $(seq 1 180); do
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$COMMAND_ID" \
              --instance-id "$EC2_INSTANCE_ID" \
              --query 'Status' \
              --output text 2>/dev/null || true)

            case "$STATUS" in
              Success)
                break
                ;;
              Failed|Cancelled|TimedOut|Cancelling)
                echo "SSM deploy thất bại với trạng thái: $STATUS"
                aws ssm get-command-invocation \
                  --command-id "$COMMAND_ID" \
                  --instance-id "$EC2_INSTANCE_ID" \
                  --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}' \
                  --output json || true
                exit 1
                ;;
              *)
                sleep 5
                ;;
            esac
          done

          if [[ "${STATUS:-}" != "Success" ]]; then
            echo "SSM deploy không hoàn tất trong thời gian chờ."
            exit 1
          fi

          aws ssm get-command-invocation \
            --command-id "$COMMAND_ID" \
            --instance-id "$EC2_INSTANCE_ID" \
            --query '{Status:Status,Output:StandardOutputContent,Error:StandardErrorContent}' \
            --output json

  # ════════════════════════════════════════════════════════════
  # JOB 2: Build React app → Upload S3 → Invalidate CloudFront
  # ════════════════════════════════════════════════════════════
  deploy-frontend:
    name: 🌐 Deploy Frontend (Build → S3 → CloudFront)
    runs-on: ubuntu-latest
    needs: deploy-backend

    steps:
      - name: 📥 Checkout source code
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: LearnSphere_FE/package-lock.json

      - name: 📦 Install dependencies
        run: |
          cd LearnSphere_FE
          npm ci

      - name: 🏗️ Build production bundle
        run: |
          cd LearnSphere_FE
          if [[ "$VITE_API_BASE_URL" != "/api" && "$VITE_API_BASE_URL" != https://* ]]; then
            echo "VITE_API_BASE_URL phải là /api hoặc URL HTTPS."
            exit 1
          fi
          npm run build
        env:
          # Production nên dùng /api qua behavior CloudFront cùng origin.
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL }}

      - name: 🔑 Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_GITHUB_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: ☁️ Sync build output lên S3
        run: |
          # Upload assets có hash trước và không xóa assets của bản cũ.
          # Lifecycle S3 sẽ dọn assets cũ sau thời gian giữ an toàn.
          aws s3 sync LearnSphere_FE/dist/assets/ \
            s3://${{ secrets.S3_FE_BUCKET }}/assets/ \
            --cache-control "public, max-age=31536000, immutable"

          # Các file root không có hash chỉ cache ngắn.
          aws s3 sync LearnSphere_FE/dist/ s3://${{ secrets.S3_FE_BUCKET }}/ \
            --exclude "assets/*" \
            --exclude "index.html" \
            --cache-control "public, max-age=3600"

          # Chỉ chuyển index.html sau khi toàn bộ asset mới đã tồn tại.
          aws s3 cp LearnSphere_FE/dist/index.html \
            s3://${{ secrets.S3_FE_BUCKET }}/index.html \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html"

      - name: 🔄 Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_FE_DISTRIBUTION_ID }} \
            --paths "/*"

          echo "✅ Frontend deployed thành công!"
          echo "URL: https://$(aws cloudfront get-distribution \
            --id ${{ secrets.CLOUDFRONT_FE_DISTRIBUTION_ID }} \
            --query 'Distribution.DomainName' \
            --output text)"
